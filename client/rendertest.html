<!DOCTYPE html>
<html>
<head>
<title>Render Test</title>
<style>
  body { margin: 0; overflow: hidden; background: #000; }
  #info { position: absolute; top: 10px; left: 10px; color: white; font-family: monospace; font-size: 14px; background: rgba(0,0,0,0.6); padding: 8px; z-index: 10; }
  canvas { display: block; }
</style>
</head>
<body>
<div id="info">Rendertest — if this shows bright green/blue cubes on a blue sky, Three.js works.<br>
  Left: MeshBasicMaterial (unlit). Middle: MeshLambertMaterial. Right: MeshStandardMaterial.<br>
  <span id="status"></span>
</div>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 3, 8);
camera.lookAt(0, 1, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// Lights for Lambert/Standard
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const sun = new THREE.DirectionalLight(0xffffff, 1.0);
sun.position.set(5, 10, 5);
scene.add(sun);

// 3 reference cubes
const c1 = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 1.5), new THREE.MeshBasicMaterial({ color: 0x44ff44 }));
c1.position.set(-3, 1, 0);
scene.add(c1);

const c2 = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 1.5), new THREE.MeshLambertMaterial({ color: 0x44ff44 }));
c2.position.set(0, 1, 0);
scene.add(c2);

const c3 = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 1.5), new THREE.MeshStandardMaterial({ color: 0x44ff44, roughness: 0.9 }));
c3.position.set(3, 1, 0);
scene.add(c3);

// A vertex-colored cube like our chunks produce (baked face shade + AO colors)
const vcGeo = new THREE.BoxGeometry(1.5, 1.5, 1.5).toNonIndexed();
const positions = vcGeo.attributes.position;
const colors = new Float32Array(positions.count * 3);
// 36 verts, 6 faces of 6 verts each. Face shade per face: -X, +X, -Y, +Y, -Z, +Z
// BoxGeometry winding order is +X, -X, +Y, -Y, +Z, -Z
const faceShadeGeo = [0.80, 0.80, 1.0, 0.55, 0.90, 0.90];
const baseR = 68/255, baseG = 140/255, baseB = 42/255;
for (let i = 0; i < positions.count; i++) {
    const faceIdx = Math.floor(i / 6);
    const s = faceShadeGeo[faceIdx];
    colors[i*3] = baseR * s;
    colors[i*3+1] = baseG * s;
    colors[i*3+2] = baseB * s;
}
vcGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
const vcMesh = new THREE.Mesh(vcGeo, new THREE.MeshBasicMaterial({ vertexColors: true }));
vcMesh.position.set(0, 3.5, 0);
scene.add(vcMesh);

// Ground plane
const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(20, 20),
    new THREE.MeshBasicMaterial({ color: 0x558b2f })
);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

document.getElementById('status').textContent =
  `THREE.REVISION=${THREE.REVISION} outputColorSpace=${renderer.outputColorSpace} toneMapping=${renderer.toneMapping}`;

function animate() {
    requestAnimationFrame(animate);
    c1.rotation.y += 0.01;
    c2.rotation.y += 0.01;
    c3.rotation.y += 0.01;
    vcMesh.rotation.y += 0.01;
    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
